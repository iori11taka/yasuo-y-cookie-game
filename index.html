<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yasuo & Cookie en Rimac</title>
  <style>
    :root {
      --bg: #0e1024;
      --panel: #171b39;
      --panel-2: #202757;
      --line: #4a5ca8;
      --text: #edf2ff;
      --muted: #b9c6ff;
      --accent: #ffd166;
      --danger: #ef476f;
      --safe: #8fd36d;
      --blue: #5dade2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Courier New", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top, #2a3b78 0%, #10142a 58%, #080b17 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .layout {
      width: min(1380px, 100%);
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .panel,
    .game-shell {
      background: rgba(17, 21, 45, 0.96);
      border: 4px solid #40539d;
      box-shadow: 0 0 0 4px #091022, 0 18px 40px rgba(0, 0, 0, 0.35);
      border-radius: 16px;
    }

    .panel {
      padding: 18px;
    }

    .title-main {
      margin: 0;
      font-size: 1.85rem;
      line-height: 1.05;
      color: var(--accent);
      text-shadow: 2px 2px 0 #000;
    }

    .subtitle {
      margin: 12px 0 16px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .card {
      background: linear-gradient(180deg, #1d2349, #171c3b);
      border: 3px solid #45579f;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #95d3ff;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: #0f1432;
      border: 2px solid #334381;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat span {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat strong {
      font-size: 1.1rem;
    }

    .portrait-wrap {
      display: grid;
      place-items: center;
      padding: 8px 0 4px;
    }

    #portraitImg {
      width: 100%;
      max-width: 250px;
      aspect-ratio: 1 / 1;
      image-rendering: pixelated;
      border-radius: 10px;
      border: 3px solid #4358a2;
      background: #6f95cf;
      object-fit: cover;
      display: block;
    }

    .btn {
      width: 100%;
      border: none;
      background: linear-gradient(180deg, #ffd166, #f4a261);
      color: #111;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #9b5d1f;
      transition: transform .12s ease;
      margin-top: 8px;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #9b5d1f; }

    .game-shell {
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .topbar-title {
      color: #9ad9ff;
      font-size: 1rem;
    }

    .message {
      color: var(--accent);
      font-size: 0.95rem;
    }

    #gameCanvas {
      width: 100%;
      max-width: 1040px;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 14px;
      border: 4px solid #4b5ea8;
      background: #10162f;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 0.85rem;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1 class="title-main">YASUO & COOKIE<br>EN RIMAC</h1>
      <p class="subtitle"></p>

      <div class="card">
        <h2>Retrato</h2>
        <div class="portrait-wrap">
          <img src="imagenes/yasuoycookie8bit.png" id="portraitImg" alt="Yasuo y Cookie">
        </div>
      </div>

      <div class="card">
        <h2>Estado de la aventura</h2>
        <div class="stats">
          <div class="stat"><span>Tesoros</span><strong id="treasuresUI">0/3</strong></div>
          <div class="stat"><span>Nivel</span><strong id="levelUI">1</strong></div>
          <div class="stat"><span>Pasos</span><strong id="stepsUI">0</strong></div>
          <div class="stat"><span>Cookie ayuda</span><strong id="cookieUI">2</strong></div>
          <div class="stat"><span>Vidas</span><strong id="livesUI">3</strong></div>
        </div>
      </div>

      <button class="btn" id="startBtn">Empezar aventura</button>
      <button class="btn" id="restartBtn">Reiniciar juego</button>
    </aside>

    <main class="game-shell">
      <div class="topbar">
        <div class="topbar-title">Cruza el Rimac y reúne los 3 tesoros</div>
        <div class="message" id="messageUI">Pulsa Empezar aventura</div>
      </div>

      <canvas id="gameCanvas"></canvas>

      <div class="footer-note">
        Mapa centrado dinámicamente y ajustado al tamaño real del nivel.
      </div>
    </main>
  </div>

  <script>
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const yasuoImg = new Image();
    yasuoImg.src = "imagenes/yasuo.png";

    const cookieImg = new Image();
    cookieImg.src = "imagenes/cookie.png";

    const fondoInicio = new Image();
    fondoInicio.src = "imagenes/rimacfondo1.png";

    const treasuresUI = document.getElementById('treasuresUI');
    const levelUI = document.getElementById('levelUI');
    const stepsUI = document.getElementById('stepsUI');
    const cookieUI = document.getElementById('cookieUI');
    const livesUI = document.getElementById('livesUI');
    const messageUI = document.getElementById('messageUI');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    const TILE = 45;
    const ROWS = 14;
    const COLS = 22;
    const REQUIRED_TREASURES = 3;

    const HUD_HEIGHT = 52;
    const SIDE_MARGIN = 24;
    const TOP_MARGIN = 18;
    const BOTTOM_MARGIN = 18;
    const BASE_CANVAS_WIDTH = 960;
    const BASE_CANVAS_HEIGHT = 600;

    const GAME = {
      title: 'title',
      playing: 'playing',
      win: 'win',
      over: 'over'
    };

    const levels = [
      {
        start: { x: 1, y: 12 },
        goal: { x: 20, y: 1 },
        chests: [{ x: 4, y: 2 }, { x: 10, y: 6 }, { x: 18, y: 10 }],
        walls: [
          [5,2],[5,3],[5,4],[5,5],
          [8,9],[9,9],[10,9],[11,9],[12,9],
          [14,2],[15,2],[16,2],[17,2],
          [15,5],[15,6],[15,7],[15,8],
          [2,7],[3,7],[4,7],[5,7],
          [8,4],[9,4],[10,4],[11,4],
          [18,4],[18,5],[18,6]
        ],
        monsters: [{ x: 7, y: 2 }, { x: 12, y: 6 }, { x: 17, y: 9 }],
        torches: [{ x: 2, y: 1 }, { x: 11, y: 1 }, { x: 19, y: 7 }],
        pathTiles: [
          [1,12],[2,12],[3,12],[4,12],[5,12],[6,12],[7,12],[8,12],
          [8,11],[8,10],[8,9],[8,8],[9,8],[10,8],[11,8],[12,8],[13,8],
          [14,8],[15,8],[16,8],[17,8],[18,8],
          [18,7],[18,6],[19,6],[20,6],[20,5],[20,4],[20,3],[20,2],[20,1]
        ]
      },
      {
        start: { x: 1, y: 1 },
        goal: { x: 20, y: 12 },
        chests: [{ x: 3, y: 11 }, { x: 11, y: 2 }, { x: 18, y: 6 }],
        walls: [
          [4,2],[4,3],[4,4],[4,5],[4,6],[4,7],
          [7,1],[8,1],[9,1],[10,1],[11,1],
          [8,5],[9,5],[10,5],[11,5],[12,5],[13,5],
          [16,7],[16,8],[16,9],
          [7,10],[8,10],[9,10],[10,10],[11,10],
          [18,2],[18,3],[18,4]
        ],
        monsters: [{ x: 6, y: 3 }, { x: 13, y: 2 }, { x: 14, y: 10 }, { x: 19, y: 4 }],
        torches: [{ x: 2, y: 2 }, { x: 13, y: 1 }, { x: 18, y: 8 }],
        pathTiles: [
          [1,1],[2,1],[3,1],[4,1],[5,1],[6,1],
          [6,2],[6,3],[6,4],[6,5],[6,6],
          [7,6],[8,6],[9,6],[10,6],[11,6],[12,6],[13,6],[14,6],
          [14,7],[14,8],[14,9],[15,9],[16,9],[17,9],[18,9],[19,9],
          [19,10],[19,11],[19,12],[20,12]
        ]
      },
      {
        start: { x: 1, y: 12 },
        goal: { x: 20, y: 1 },
        chests: [{ x: 3, y: 2 }, { x: 9, y: 11 }, { x: 17, y: 3 }],
        walls: [
          [3,4],[4,4],[5,4],[6,4],[7,4],[8,4],
          [10,2],[10,3],[10,4],[10,5],[10,6],[10,7],
          [13,10],[14,10],[15,10],[16,10],[17,10],
          [5,8],[6,8],[7,8],[8,8],
          [15,3],[15,4],[15,5],[15,6],
          [18,6],[19,6],[20,6]
        ],
        monsters: [{ x: 6, y: 2 }, { x: 8, y: 10 }, { x: 14, y: 4 }, { x: 19, y: 9 }, { x: 12, y: 11 }],
        torches: [{ x: 2, y: 1 }, { x: 12, y: 2 }, { x: 19, y: 8 }],
        pathTiles: [
          [1,12],[2,12],[3,12],[4,12],[5,12],[6,12],[7,12],
          [7,11],[7,10],[7,9],[8,9],[9,9],[10,9],[11,9],[12,9],
          [12,8],[12,7],[12,6],[12,5],
          [13,5],[14,5],[15,5],[16,5],[17,5],[18,5],
          [18,4],[18,3],[18,2],[19,2],[20,2],[20,1]
        ]
      }
    ];

    const state = {
      phase: GAME.title,
      level: 0,
      treasures: 0,
      steps: 0,
      cookieCharges: 2,
      lives: 3,
      invulnerable: 0,
      flashTimer: 0,
      message: '',
      player: { x: 1, y: 1 },
      goal: { x: 20, y: 12 },
      currentLevel: null,
      monsters: []
    };

    let MAP_WIDTH = COLS * TILE;
    let MAP_HEIGHT = ROWS * TILE;
    let OFFSET_X = 0;
    let OFFSET_Y = 0;

    function resizeCanvasToMap() {
      MAP_WIDTH = COLS * TILE;
      MAP_HEIGHT = ROWS * TILE;

      const desiredWidth = MAP_WIDTH + SIDE_MARGIN * 2;
      const desiredHeight = HUD_HEIGHT + TOP_MARGIN + MAP_HEIGHT + BOTTOM_MARGIN;

      gameCanvas.width = Math.max(BASE_CANVAS_WIDTH, desiredWidth);
      gameCanvas.height = Math.max(BASE_CANVAS_HEIGHT, desiredHeight);

      OFFSET_X = Math.floor((gameCanvas.width - MAP_WIDTH) / 2);
      OFFSET_Y = Math.floor(HUD_HEIGHT + TOP_MARGIN + ((gameCanvas.height - HUD_HEIGHT - TOP_MARGIN - BOTTOM_MARGIN - MAP_HEIGHT) / 2));
    }

    function deepCopy(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function tileToPixel(x, y) {
      return {
        px: OFFSET_X + x * TILE,
        py: OFFSET_Y + y * TILE
      };
    }

    function setMessage(msg) {
      state.message = msg;
      messageUI.textContent = msg;
    }

    function updateUI() {
      treasuresUI.textContent = `${state.treasures}/${REQUIRED_TREASURES}`;
      levelUI.textContent = state.level + 1;
      stepsUI.textContent = state.steps;
      cookieUI.textContent = state.cookieCharges;
      livesUI.textContent = state.lives;
    }

    function loadLevel(index) {
      const lvl = deepCopy(levels[index]);
      state.level = index;
      state.currentLevel = lvl;
      state.player = { ...lvl.start };
      state.goal = { ...lvl.goal };
      state.cookieCharges = 2;
      state.invulnerable = 0;
      state.treasures = 0;
      state.monsters = lvl.monsters.map(m => ({
        x: m.x,
        y: m.y,
        stunned: 0,
        cooldown: Math.random() * 16
      }));
      updateUI();
    }

    function startGame() {
      state.phase = GAME.playing;
      state.steps = 0;
      state.lives = 3;
      loadLevel(0);
      setMessage('Recolecta los 3 tesoros del mapa y llega al punto B.');
    }

    function restartGame() {
      state.phase = GAME.title;
      state.level = 0;
      state.treasures = 0;
      state.steps = 0;
      state.cookieCharges = 2;
      state.lives = 3;
      state.invulnerable = 0;
      setMessage('Pulsa Enter para comenzar');
      updateUI();
    }

    function isWall(x, y) {
      return state.currentLevel.walls.some(w => w[0] === x && w[1] === y);
    }

    function occupiedByMonster(x, y, ignored = null) {
      return state.monsters.some(m => m !== ignored && m.x === x && m.y === y);
    }

    function collectChestIfPresent() {
      const chestIndex = state.currentLevel.chests.findIndex(
        chest => chest.x === state.player.x && chest.y === state.player.y
      );

      if (chestIndex !== -1) {
        state.currentLevel.chests.splice(chestIndex, 1);
        state.treasures += 1;
        updateUI();

        if (state.treasures >= REQUIRED_TREASURES) {
          setMessage('¡Ya tienes los 3 tesoros! Ahora llega al punto B.');
        } else {
          setMessage(`¡Tesoro recogido! Llevas ${state.treasures}/${REQUIRED_TREASURES}.`);
        }
      }
    }

    function movePlayer(dx, dy) {
      if (state.phase !== GAME.playing) return;

      const nx = state.player.x + dx;
      const ny = state.player.y + dy;

      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
      if (isWall(nx, ny)) return;

      state.player.x = nx;
      state.player.y = ny;
      state.steps += 1;

      collectChestIfPresent();
      updateUI();

      if (state.player.x === state.goal.x && state.player.y === state.goal.y) {
        if (state.treasures < REQUIRED_TREASURES) {
          setMessage(`Aún te faltan ${REQUIRED_TREASURES - state.treasures} tesoro(s) para pasar.`);
          return;
        }

        if (state.level < levels.length - 1) {
          loadLevel(state.level + 1);
          setMessage('¡Nivel superado! Recolecta los 3 tesoros del siguiente mapa.');
        } else {
          state.phase = GAME.win;
          setMessage('¡Yasuo y Cookie reunieron todos los tesoros de Rimac!');
        }
      }
    }

    function useCookiePower() {
      if (state.phase !== GAME.playing) return;

      if (state.cookieCharges <= 0) {
        setMessage('Cookie ya no tiene energía en este nivel.');
        return;
      }

      let affected = 0;

      for (const monster of state.monsters) {
        const d = Math.abs(monster.x - state.player.x) + Math.abs(monster.y - state.player.y);
        if (d <= 2) {
          monster.stunned = 140;
          affected += 1;
        }
      }

      state.cookieCharges -= 1;
      updateUI();

      if (affected > 0) {
        setMessage('¡Cookie maulló y ahuyentó a ' + affected + ' monstruo(s)!');
      } else {
        setMessage('Cookie vigiló el camino, pero no había monstruos cerca.');
      }
    }

    function updateMonsters(delta) {
      for (const monster of state.monsters) {
        if (monster.stunned > 0) {
          monster.stunned -= 1;
          continue;
        }

        monster.cooldown -= delta;
        if (monster.cooldown > 0) continue;

        const dirs = [
          { x: 1, y: 0 },
          { x: -1, y: 0 },
          { x: 0, y: 1 },
          { x: 0, y: -1 },
          { x: 0, y: 0 }
        ];

        for (let i = dirs.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
        }

        let moved = false;

        for (const dir of dirs) {
          const nx = monster.x + dir.x;
          const ny = monster.y + dir.y;

          const valid =
            nx >= 0 && nx < COLS &&
            ny >= 0 && ny < ROWS &&
            !isWall(nx, ny) &&
            !occupiedByMonster(nx, ny, monster) &&
            !(nx === state.goal.x && ny === state.goal.y) &&
            !(nx === state.currentLevel.start.x && ny === state.currentLevel.start.y);

          if (valid) {
            monster.x = nx;
            monster.y = ny;
            moved = true;
            break;
          }
        }

        monster.cooldown = moved ? (8 + Math.random() * 16) : (5 + Math.random() * 8);
      }
    }

    function checkCollisions() {
      if (state.invulnerable > 0) {
        state.invulnerable -= 1;
        return;
      }

      for (const monster of state.monsters) {
        if (monster.x === state.player.x && monster.y === state.player.y) {
          state.lives -= 1;
          state.invulnerable = 80;
          state.flashTimer = 14;
          state.player = { ...state.currentLevel.start };
          updateUI();

          if (state.lives <= 0) {
            state.phase = GAME.over;
            setMessage('Los monstruos nocturnos detuvieron a Yasuo y Cookie...');
          } else {
            setMessage(`¡Te atrapó un monstruo! Vuelves al inicio. Vidas restantes: ${state.lives}.`);
          }
          break;
        }
      }
    }

    function drawRectPixel(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawMonsterTile(tileX, tileY, stunned = false) {
      const { px, py } = tileToPixel(tileX, tileY);

      const c1 = stunned ? '#9b5de5' : '#24185a';
      const c2 = stunned ? '#c294ff' : '#ef476f';
      const c3 = stunned ? '#f2e8ff' : '#ffffff';

      drawRectPixel(px + 10, py + 14, 28, 22, c1);
      drawRectPixel(px + 6, py + 18, 6, 12, c1);
      drawRectPixel(px + 36, py + 18, 6, 12, c1);
      drawRectPixel(px + 14, py + 16, 8, 8, c3);
      drawRectPixel(px + 26, py + 16, 8, 8, c3);
      drawRectPixel(px + 17, py + 19, 4, 4, '#111');
      drawRectPixel(px + 29, py + 19, 4, 4, '#111');
      drawRectPixel(px + 16, py + 28, 16, 6, c2);
      drawRectPixel(px + 19, py + 30, 2, 2, '#111');
      drawRectPixel(px + 27, py + 30, 2, 2, '#111');
    }

    function drawChestTile(tileX, tileY) {
      const { px, py } = tileToPixel(tileX, tileY);

      drawRectPixel(px + 8, py + 18, 32, 18, '#b56c2d');
      drawRectPixel(px + 8, py + 14, 32, 8, '#e4b144');
      drawRectPixel(px + 12, py + 16, 24, 3, '#fff1a8');
      drawRectPixel(px + 21, py + 20, 6, 9, '#5f3b19');
      drawRectPixel(px + 22, py + 22, 4, 5, '#f4df6b');
    }

    function drawGrid() {
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const { px, py } = tileToPixel(x, y);
          const alt = (x + y) % 2 === 0;

          ctx.fillStyle = alt ? '#1d694e' : '#1c5f4a';
          ctx.fillRect(px, py, TILE, TILE);

          ctx.fillStyle = alt ? '#2a8463' : '#2f8f6c';
          ctx.fillRect(px + 6, py + 10, 6, 4);
          ctx.fillRect(px + 24, py + 30, 5, 3);
          ctx.fillRect(px + 34, py + 18, 4, 3);
        }
      }
    }

    function drawPath() {
      if (!state.currentLevel?.pathTiles) return;

      for (const [x, y] of state.currentLevel.pathTiles) {
        const { px, py } = tileToPixel(x, y);

        ctx.fillStyle = '#90755c';
        ctx.fillRect(px, py, TILE, TILE);

        ctx.fillStyle = '#a58a6f';
        ctx.fillRect(px + 7, py + 10, 9, 6);
        ctx.fillRect(px + 24, py + 24, 7, 5);
      }
    }

    function drawNightSky() {
      ctx.fillStyle = '#172352';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      const moonX = gameCanvas.width - 120;
      const moonY = 24;

      ctx.fillStyle = '#f7f2c4';
      ctx.fillRect(moonX, moonY, 26, 26);

      ctx.fillStyle = '#172352';
      ctx.fillRect(moonX + 10, moonY, 16, 24);

      const stars = [
        [80,20],[120,42],[180,28],[260,18],[320,38],
        [520,30],[620,25],[710,18],[830,34],[900,22]
      ];

      ctx.fillStyle = '#e9f3ff';
      for (const [sx, sy] of stars) {
        if (sx < gameCanvas.width - 20) {
          ctx.fillRect(sx, sy, 3, 3);
        }
      }
    }

    function drawTorches() {
      if (!state.currentLevel?.torches) return;

      for (const point of state.currentLevel.torches) {
        const { px, py } = tileToPixel(point.x, point.y);

        ctx.fillStyle = '#4d341c';
        ctx.fillRect(px + 20, py + 14, 6, 24);

        ctx.fillStyle = '#ffd166';
        ctx.fillRect(px + 18, py, 10, 14);

        ctx.fillStyle = '#ff8c42';
        ctx.fillRect(px + 20, py + 2, 6, 10);
      }
    }

    function drawWalls() {
      for (const [wx, wy] of state.currentLevel.walls) {
        const { px, py } = tileToPixel(wx, wy);

        ctx.fillStyle = '#344067';
        ctx.fillRect(px, py, TILE, TILE);

        ctx.fillStyle = '#495b8a';
        ctx.fillRect(px + 2, py + 2, 20, 12);
        ctx.fillRect(px + 24, py + 16, 20, 12);
        ctx.fillRect(px + 8, py + 30, 18, 10);
      }
    }

    function drawStartGoal() {
      const startPos = tileToPixel(state.currentLevel.start.x, state.currentLevel.start.y);
      const goalPos = tileToPixel(state.goal.x, state.goal.y);

      ctx.fillStyle = '#c63f46';
      ctx.fillRect(startPos.px + 6, startPos.py + 6, 36, 36);

      ctx.fillStyle = '#fff8df';
      ctx.font = 'bold 28px Courier New';
      ctx.fillText('A', startPos.px + 16, startPos.py + 33);

      ctx.fillStyle = '#314d93';
      ctx.fillRect(goalPos.px + 8, goalPos.py + 2, 32, 42);

      ctx.fillStyle = '#2d2a42';
      ctx.fillRect(goalPos.px + 14, goalPos.py + 10, 20, 34);

      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 26px Courier New';
      ctx.fillText('B', goalPos.px + 17, goalPos.py + 35);
    }

    function drawTreasuresBar() {
      for (let i = 0; i < REQUIRED_TREASURES; i++) {
        ctx.fillStyle = i < state.treasures ? '#ffd166' : '#4b4f70';
        ctx.fillRect(16 + i * 20, 14, 14, 14);

        ctx.fillStyle = i < state.treasures ? '#fff0a6' : '#2e3146';
        ctx.fillRect(19 + i * 20, 17, 7, 7);
      }
    }

    function drawHUD() {
      ctx.fillStyle = '#1c214a';
      ctx.fillRect(0, 0, gameCanvas.width, HUD_HEIGHT);

      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 22px Courier New';
      ctx.fillText('TESOROS: ' + state.treasures + '/' + REQUIRED_TREASURES, 16, 34);
      ctx.fillText('VIDAS: ' + state.lives, 320, 34);
      ctx.fillText('RIMAC - NIVEL ' + (state.level + 1), gameCanvas.width - 300, 34);

      drawTreasuresBar();
    }

    function drawPlayer() {
      const blink = state.invulnerable > 0 && Math.floor(state.invulnerable / 6) % 2 === 0;
      if (blink) return;

      const { px, py } = tileToPixel(state.player.x, state.player.y);

      ctx.drawImage(yasuoImg, px + 2, py - 2, TILE, TILE);
      ctx.drawImage(cookieImg, px + TILE * 0.45, py + TILE * 0.22, TILE * 0.55, TILE * 0.55);
    }

    function drawChests() {
      for (const chest of state.currentLevel.chests) {
        drawChestTile(chest.x, chest.y);
      }
    }

    function drawMonsters() {
      for (const monster of state.monsters) {
        drawMonsterTile(monster.x, monster.y, monster.stunned > 0);
      }
    }

    function drawTitleScreen() {
      ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

      if (fondoInicio.complete && fondoInicio.naturalWidth > 0) {
        ctx.drawImage(fondoInicio, 0, 0, gameCanvas.width, gameCanvas.height);
      } else {
        ctx.fillStyle = '#172352';
        ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
      }

      ctx.fillStyle = 'rgba(8, 12, 30, 0.22)';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      const boxW = 580;
      const boxH = 100;
      const boxX = Math.floor((gameCanvas.width - boxW) / 2);
      const boxY = 36;

      ctx.fillStyle = 'rgba(12, 20, 48, 0.72)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeStyle = '#5b74c5';
      ctx.lineWidth = 4;
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      ctx.fillStyle = '#fff8de';
      ctx.textAlign = 'center';
      ctx.font = 'bold 42px Courier New';
      ctx.fillText('YASUO & COOKIE', gameCanvas.width / 2, 82);

      ctx.font = 'bold 26px Courier New';
      ctx.fillText('EN RIMAC', gameCanvas.width / 2, 116);

      const promptW = 460;
      const promptH = 54;
      const promptX = Math.floor((gameCanvas.width - promptW) / 2);
      const promptY = gameCanvas.height - 92;

      ctx.fillStyle = 'rgba(12, 20, 48, 0.82)';
      ctx.fillRect(promptX, promptY, promptW, promptH);
      ctx.strokeStyle = '#5b74c5';
      ctx.lineWidth = 3;
      ctx.strokeRect(promptX, promptY, promptW, promptH);

      ctx.fillStyle = '#fff8de';
      ctx.font = 'bold 22px Courier New';
      ctx.fillText('ENTER PARA COMENZAR', gameCanvas.width / 2, promptY + 36);

      ctx.textAlign = 'left';
    }

    function drawEndOverlay(title, subtitle) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      const boxW = 520;
      const boxH = 150;
      const boxX = Math.floor((gameCanvas.width - boxW) / 2);
      const boxY = Math.floor((gameCanvas.height - boxH) / 2);

      ctx.fillStyle = '#263f7a';
      ctx.fillRect(boxX, boxY, boxW, boxH);

      ctx.strokeStyle = '#5d78c9';
      ctx.lineWidth = 4;
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      ctx.fillStyle = title.includes('Victoria') ? '#8fd36d' : '#ef476f';
      ctx.font = 'bold 34px Courier New';
      ctx.fillText(title, boxX + 90, boxY + 55);

      ctx.fillStyle = '#fff8de';
      ctx.font = 'bold 20px Courier New';
      ctx.fillText(subtitle, boxX + 55, boxY + 102);
    }

    function drawPlayingScene() {
      ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

      drawNightSky();
      drawGrid();
      drawPath();
      drawTorches();
      drawWalls();
      drawChests();
      drawStartGoal();
      drawMonsters();
      drawPlayer();
      drawHUD();
    }

    function draw() {
      if (state.phase === GAME.title) {
        drawTitleScreen();
        return;
      }

      drawPlayingScene();

      if (state.phase === GAME.win) {
        drawEndOverlay('¡Victoria en Rimac!', 'Reinicia para jugar otra vez');
      }

      if (state.phase === GAME.over) {
        drawEndOverlay('Fin del juego', 'Los monstruos te detuvieron');
      }
    }

    let lastTime = 0;

    function loop(timestamp) {
      const delta = Math.min((timestamp - lastTime) / 16.67, 2);
      lastTime = timestamp;

      if (state.phase === GAME.playing) {
        updateMonsters(delta);
        checkCollisions();
      }

      if (state.flashTimer > 0) state.flashTimer -= 1;

      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (
        ['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' ','enter'].includes(key) ||
        ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].includes(e.key)
      ) {
        e.preventDefault();
      }

      if (state.phase === GAME.title && key === 'enter') {
        startGame();
        return;
      }

      if (key === 'arrowup' || key === 'w') movePlayer(0, -1);
      if (key === 'arrowdown' || key === 's') movePlayer(0, 1);
      if (key === 'arrowleft' || key === 'a') movePlayer(-1, 0);
      if (key === 'arrowright' || key === 'd') movePlayer(1, 0);
      if (e.key === ' ') useCookiePower();
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', restartGame);

    resizeCanvasToMap();
    restartGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
