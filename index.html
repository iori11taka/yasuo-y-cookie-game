<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yasuo & Cookie en Rimac</title>
  <style>
    :root {
      --bg: #0e1024;
      --panel: #171b39;
      --panel-2: #202757;
      --line: #4a5ca8;
      --text: #edf2ff;
      --muted: #b9c6ff;
      --accent: #ffd166;
      --danger: #ef476f;
      --safe: #8fd36d;
      --blue: #5dade2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Courier New", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top, #2a3b78 0%, #10142a 58%, #080b17 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .layout {
      width: min(1280px, 100%);
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .panel,
    .game-shell {
      background: rgba(17, 21, 45, 0.96);
      border: 4px solid #40539d;
      box-shadow: 0 0 0 4px #091022, 0 18px 40px rgba(0, 0, 0, 0.35);
      border-radius: 16px;
    }

    .panel {
      padding: 18px;
    }

    .title-main {
      margin: 0;
      font-size: 1.85rem;
      line-height: 1.05;
      color: var(--accent);
      text-shadow: 2px 2px 0 #000;
    }

    .subtitle {
      margin: 12px 0 16px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .card {
      background: linear-gradient(180deg, #1d2349, #171c3b);
      border: 3px solid #45579f;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #95d3ff;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: #0f1432;
      border: 2px solid #334381;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat span {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat strong {
      font-size: 1.1rem;
    }

    .portrait-wrap {
      display: grid;
      place-items: center;
      padding: 8px 0 4px;
    }

    #portraitImg {
      width: 100%;
      max-width: 250px;
      aspect-ratio: 1 / 1;
      image-rendering: pixelated;
      border-radius: 10px;
      border: 3px solid #4358a2;
      background: #6f95cf;
      object-fit: cover;
      display: block;
    }

    .btn {
      width: 100%;
      border: none;
      background: linear-gradient(180deg, #ffd166, #f4a261);
      color: #111;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #9b5d1f;
      transition: transform .12s ease;
      margin-top: 8px;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #9b5d1f; }

    .game-shell {
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .topbar-title {
      color: #9ad9ff;
      font-size: 1rem;
    }

    .message {
      color: var(--accent);
      font-size: 0.95rem;
    }

    #gameCanvas {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 10;
      display: block;
      margin: 0 auto;
      border-radius: 14px;
      border: 4px solid #4b5ea8;
      background: #10162f;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 0.85rem;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1 class="title-main">YASUO & COOKIE<br>EN RIMAC</h1>
      <p class="subtitle"></p>

      <div class="card">
        <h2>Cuidado con las criaturas de la noche...</h2>
        <div class="portrait-wrap">
          <img src="imagenes/yasuoycookie8bit.png" id="portraitImg" alt="Yasuo y Cookie">
        </div>
      </div>

      <div class="card">
        <h2>Estado de la aventura</h2>
        <div class="stats">
          <div class="stat"><span>Tesoros</span><strong id="treasuresUI">3</strong></div>
          <div class="stat"><span>Nivel</span><strong id="levelUI">1</strong></div>
          <div class="stat"><span>Pasos</span><strong id="stepsUI">0</strong></div>
          <div class="stat"><span>Cookie ayuda</span><strong id="cookieUI">2</strong></div>
        </div>
      </div>

      <button class="btn" id="startBtn">Empezar aventura</button>
      <button class="btn" id="restartBtn">Reiniciar juego</button>
    </aside>

    <main class="game-shell">
      <div class="topbar">
        <div class="topbar-title">Cruza el Rimac y protege tus tesoros</div>
        <div class="message" id="messageUI">Pulsa Empezar aventura</div>
      </div>
      <canvas id="gameCanvas" width="960" height="600"></canvas>
      <div class="footer-note">Pendiente agregar personajes y mejorar calidad :P</div>
    </main>
  </div>

  <script>
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');

    ctx.imageSmoothingEnabled = false;

    const yasuoImg = new Image();
    yasuoImg.src = "imagenes/yasuo.png";

    const cookieImg = new Image();
    cookieImg.src = "imagenes/cookie.png";

    const fondoInicio = new Image();
    fondoInicio.src = "imagenes/rimacfondo1.png";

    const treasuresUI = document.getElementById('treasuresUI');
    const levelUI = document.getElementById('levelUI');
    const stepsUI = document.getElementById('stepsUI');
    const cookieUI = document.getElementById('cookieUI');
    const messageUI = document.getElementById('messageUI');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    const TILE = 48;
    const ROWS = 10;
    const COLS = 16;

    const GAME = {
      title: 'title',
      playing: 'playing',
      win: 'win',
      over: 'over'
    };

    const levels = [
      {
        start: { x: 1, y: 8 },
        goal: { x: 14, y: 1 },
        chests: [{x:3,y:2},{x:7,y:4},{x:12,y:7}],
        walls: [
          [4,1],[4,2],[4,3],[4,4],
          [6,6],[7,6],[8,6],[9,6],
          [10,2],[11,2],[12,2],
          [11,4],[11,5],[11,6],
          [2,6],[3,6],[4,6]
        ],
        monsters: [{x:6,y:2},{x:9,y:4},{x:13,y:6}]
      },
      {
        start: { x: 1, y: 1 },
        goal: { x: 14, y: 8 },
        chests: [{x:2,y:7},{x:8,y:2},{x:13,y:4},{x:5,y:4}],
        walls: [
          [3,2],[3,3],[3,4],[3,5],[3,6],
          [6,1],[7,1],[8,1],[9,1],
          [6,4],[7,4],[8,4],[9,4],[10,4],
          [12,5],[12,6],[12,7],
          [6,8],[7,8],[8,8],[9,8]
        ],
        monsters: [{x:5,y:2},{x:11,y:1},{x:10,y:7},{x:13,y:2}]
      },
      {
        start: { x: 1, y: 8 },
        goal: { x: 14, y: 1 },
        chests: [{x:3,y:1},{x:5,y:7},{x:10,y:2},{x:13,y:8}],
        walls: [
          [2,3],[3,3],[4,3],[5,3],[6,3],
          [8,1],[8,2],[8,3],[8,4],[8,5],
          [10,6],[11,6],[12,6],[13,6],
          [3,6],[4,6],[5,6],[6,6],
          [12,2],[12,3],[12,4]
        ],
        monsters: [{x:5,y:1},{x:7,y:7},{x:11,y:2},{x:14,y:5},{x:9,y:8}]
      }
    ];

    const state = {
      phase: GAME.title,
      level: 0,
      treasures: 3,
      steps: 0,
      cookieCharges: 2,
      invulnerable: 0,
      flashTimer: 0,
      message: '',
      player: { x: 1, y: 1 },
      goal: { x: 14, y: 8 },
      currentLevel: null,
      monsters: []
    };

    function deepCopy(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function setMessage(msg) {
      state.message = msg;
      messageUI.textContent = msg;
    }

    function updateUI() {
      treasuresUI.textContent = state.treasures;
      levelUI.textContent = state.level + 1;
      stepsUI.textContent = state.steps;
      cookieUI.textContent = state.cookieCharges;
    }

    function loadLevel(index) {
      const lvl = deepCopy(levels[index]);
      state.level = index;
      state.currentLevel = lvl;
      state.player = { ...lvl.start };
      state.goal = { ...lvl.goal };
      state.cookieCharges = 2;
      state.invulnerable = 0;
      state.monsters = lvl.monsters.map(m => ({
        x: m.x,
        y: m.y,
        stunned: 0,
        cooldown: Math.random() * 16
      }));
      updateUI();
    }

    function startGame() {
      state.phase = GAME.playing;
      state.treasures = 3;
      state.steps = 0;
      loadLevel(0);
      setMessage('La noche cae sobre Rimac... protege los tesoros.');
    }

    function restartGame() {
      state.phase = GAME.title;
      state.level = 0;
      state.treasures = 3;
      state.steps = 0;
      state.cookieCharges = 2;
      state.invulnerable = 0;
      setMessage('Pulsa Enter pe sano');
      updateUI();
    }

    function isWall(x, y) {
      return state.currentLevel.walls.some(w => w[0] === x && w[1] === y);
    }

    function occupiedByMonster(x, y, ignored = null) {
      return state.monsters.some(m => m !== ignored && m.x === x && m.y === y);
    }

    function movePlayer(dx, dy) {
      if (state.phase !== GAME.playing) return;

      const nx = state.player.x + dx;
      const ny = state.player.y + dy;

      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
      if (isWall(nx, ny)) return;

      state.player.x = nx;
      state.player.y = ny;
      state.steps += 1;
      updateUI();

      if (state.player.x === state.goal.x && state.player.y === state.goal.y) {
        if (state.level < levels.length - 1) {
          loadLevel(state.level + 1);
          setMessage('¡Nivel superado! Los monstruos son más agresivos...');
        } else {
          state.phase = GAME.win;
          setMessage('¡Yasuo y Cookie salvaron los tesoros de Rimac!');
        }
      }
    }

    function useCookiePower() {
      if (state.phase !== GAME.playing) return;

      if (state.cookieCharges <= 0) {
        setMessage('Cookie ya no tiene energía en este nivel.');
        return;
      }

      let affected = 0;

      for (const monster of state.monsters) {
        const d = Math.abs(monster.x - state.player.x) + Math.abs(monster.y - state.player.y);
        if (d <= 2) {
          monster.stunned = 140;
          affected += 1;
        }
      }

      state.cookieCharges -= 1;
      updateUI();

      if (affected > 0) {
        setMessage('¡Cookie maulló y ahuyentó a ' + affected + ' monstruo(s)!');
      } else {
        setMessage('Cookie vigiló el camino, pero no había monstruos cerca.');
      }
    }

    function updateMonsters(delta) {
      for (const monster of state.monsters) {
        if (monster.stunned > 0) {
          monster.stunned -= 1;
          continue;
        }

        monster.cooldown -= delta;
        if (monster.cooldown > 0) continue;

        const dirs = [
          {x: 1, y: 0},
          {x: -1, y: 0},
          {x: 0, y: 1},
          {x: 0, y: -1},
          {x: 0, y: 0}
        ];

        for (let i = dirs.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
        }

        let moved = false;

        for (const dir of dirs) {
          const nx = monster.x + dir.x;
          const ny = monster.y + dir.y;

          const valid =
            nx >= 0 && nx < COLS &&
            ny >= 0 && ny < ROWS &&
            !isWall(nx, ny) &&
            !occupiedByMonster(nx, ny, monster) &&
            !(nx === state.goal.x && ny === state.goal.y) &&
            !(nx === state.currentLevel.start.x && ny === state.currentLevel.start.y);

          if (valid) {
            monster.x = nx;
            monster.y = ny;
            moved = true;
            break;
          }
        }

        monster.cooldown = moved ? (8 + Math.random() * 16) : (5 + Math.random() * 8);
      }
    }

    function checkCollisions() {
      if (state.invulnerable > 0) {
        state.invulnerable -= 1;
        return;
      }

      for (const monster of state.monsters) {
        if (monster.x === state.player.x && monster.y === state.player.y) {
          state.treasures -= 1;
          state.invulnerable = 80;
          state.flashTimer = 14;
          state.player = { ...state.currentLevel.start };
          updateUI();

          if (state.treasures <= 0) {
            state.phase = GAME.over;
            setMessage('Los monstruos nocturnos robaron todos los tesoros...');
          } else {
            setMessage('¡Perdiste un tesoro! Intenta cruzar otra vez.');
          }
          break;
        }
      }
    }

    function drawRectPixel(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawMonster(x, y, stunned = false) {
      const c1 = stunned ? '#9b5de5' : '#24185a';
      const c2 = stunned ? '#c294ff' : '#ef476f';
      const c3 = stunned ? '#f2e8ff' : '#ffffff';

      drawRectPixel(x + 10, y + 14, 28, 22, c1);
      drawRectPixel(x + 6, y + 18, 6, 12, c1);
      drawRectPixel(x + 36, y + 18, 6, 12, c1);
      drawRectPixel(x + 14, y + 16, 8, 8, c3);
      drawRectPixel(x + 26, y + 16, 8, 8, c3);
      drawRectPixel(x + 17, y + 19, 4, 4, '#111');
      drawRectPixel(x + 29, y + 19, 4, 4, '#111');
      drawRectPixel(x + 16, y + 28, 16, 6, c2);
      drawRectPixel(x + 19, y + 30, 2, 2, '#111');
      drawRectPixel(x + 27, y + 30, 2, 2, '#111');
    }

    function drawChest(x, y) {
      drawRectPixel(x + 8, y + 18, 32, 18, '#b56c2d');
      drawRectPixel(x + 8, y + 14, 32, 8, '#e4b144');
      drawRectPixel(x + 12, y + 16, 24, 3, '#fff1a8');
      drawRectPixel(x + 21, y + 20, 6, 9, '#5f3b19');
      drawRectPixel(x + 22, y + 22, 4, 5, '#f4df6b');
    }

    function drawGrid() {
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const px = x * TILE;
          const py = y * TILE;
          const alt = (x + y) % 2 === 0;

          ctx.fillStyle = alt ? '#1d694e' : '#1c5f4a';
          ctx.fillRect(px, py, TILE, TILE);

          ctx.fillStyle = alt ? '#2a8463' : '#2f8f6c';
          ctx.fillRect(px + 6, py + 10, 6, 4);
          ctx.fillRect(px + 24, py + 30, 5, 3);
          ctx.fillRect(px + 34, py + 18, 4, 3);
        }
      }
    }

    function drawPath() {
      const pathTiles = [
        [1,8],[2,8],[3,8],[4,8],[5,8],[6,8],[7,8],
        [7,7],[7,6],[7,5],[8,5],[9,5],[10,5],[11,5],[12,5],
        [12,4],[12,3],[13,3],[14,3],[14,2],[14,1]
      ];

      for (const [x, y] of pathTiles) {
        const px = x * TILE;
        const py = y * TILE;

        ctx.fillStyle = '#90755c';
        ctx.fillRect(px, py, TILE, TILE);

        ctx.fillStyle = '#a58a6f';
        ctx.fillRect(px + 7, py + 10, 9, 6);
        ctx.fillRect(px + 24, py + 24, 7, 5);
      }
    }

    function drawNightSky() {
      ctx.fillStyle = '#172352';
      ctx.fillRect(0, 0, gameCanvas.width, 80);

      ctx.fillStyle = '#f7f2c4';
      ctx.fillRect(428, 18, 26, 26);

      ctx.fillStyle = '#172352';
      ctx.fillRect(438, 18, 16, 24);

      const stars = [
        [80,20],[120,42],[180,28],[260,18],[320,38],
        [520,30],[620,25],[710,18],[830,34],[900,22]
      ];

      ctx.fillStyle = '#e9f3ff';
      for (const [sx, sy] of stars) {
        ctx.fillRect(sx, sy, 3, 3);
      }
    }

    function drawTorches() {
      const points = [{x:2,y:1},{x:10,y:1},{x:14,y:5}];

      for (const point of points) {
        const px = point.x * TILE + 20;
        const py = point.y * TILE + 2;

        ctx.fillStyle = '#4d341c';
        ctx.fillRect(px, py + 14, 6, 24);

        ctx.fillStyle = '#ffd166';
        ctx.fillRect(px - 2, py, 10, 14);

        ctx.fillStyle = '#ff8c42';
        ctx.fillRect(px, py + 2, 6, 10);
      }
    }

    function drawWalls() {
      for (const [wx, wy] of state.currentLevel.walls) {
        const px = wx * TILE;
        const py = wy * TILE;

        ctx.fillStyle = '#344067';
        ctx.fillRect(px, py, TILE, TILE);

        ctx.fillStyle = '#495b8a';
        ctx.fillRect(px + 2, py + 2, 20, 12);
        ctx.fillRect(px + 24, py + 16, 20, 12);
        ctx.fillRect(px + 8, py + 30, 18, 10);
      }
    }

    function drawStartGoal() {
      const sx = state.currentLevel.start.x * TILE;
      const sy = state.currentLevel.start.y * TILE;
      const gx = state.goal.x * TILE;
      const gy = state.goal.y * TILE;

      ctx.fillStyle = '#c63f46';
      ctx.fillRect(sx + 6, sy + 6, 36, 36);

      ctx.fillStyle = '#fff8df';
      ctx.font = 'bold 28px Courier New';
      ctx.fillText('A', sx + 16, sy + 33);

      ctx.fillStyle = '#314d93';
      ctx.fillRect(gx + 8, gy + 2, 32, 42);

      ctx.fillStyle = '#2d2a42';
      ctx.fillRect(gx + 14, gy + 10, 20, 34);

      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 26px Courier New';
      ctx.fillText('B', gx + 17, gy + 35);
    }

    function drawTreasuresBar() {
      for (let i = 0; i < state.treasures; i++) {
        ctx.fillStyle = '#ffd166';
        ctx.fillRect(16 + i * 20, 12, 14, 14);

        ctx.fillStyle = '#fff0a6';
        ctx.fillRect(19 + i * 20, 15, 7, 7);
      }
    }

    function drawHUD() {
      ctx.fillStyle = '#1c214a';
      ctx.fillRect(0, 0, gameCanvas.width, 48);

      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 22px Courier New';
      ctx.fillText('TESOROS: ' + state.treasures, 16, 31);
      ctx.fillText('RIMAC - NIVEL ' + (state.level + 1), 620, 31);

      drawTreasuresBar();
    }

    function drawPlayer() {
      const blink = state.invulnerable > 0 && Math.floor(state.invulnerable / 6) % 2 === 0;
      if (blink) return;

      const px = state.player.x * TILE + 24;
      const py = state.player.y * TILE + 26;

      ctx.drawImage(yasuoImg, px - 22, py - 30, 46, 46);
      ctx.drawImage(cookieImg, px + 10, py - 2, 30, 30);
    }

    function drawChests() {
      for (const chest of state.currentLevel.chests) {
        drawChest(chest.x * TILE, chest.y * TILE);
      }
    }

    function drawMonsters() {
      for (const monster of state.monsters) {
        drawMonster(monster.x * TILE, monster.y * TILE, monster.stunned > 0);
      }
    }

    function drawTitleScreen() {
      ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

      if (fondoInicio.complete && fondoInicio.naturalWidth > 0) {
        ctx.drawImage(fondoInicio, 0, 0, gameCanvas.width, gameCanvas.height);
      } else {
        ctx.fillStyle = '#172352';
        ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
      }

      ctx.fillStyle = 'rgba(8, 12, 30, 0.22)';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      ctx.fillStyle = 'rgba(12, 20, 48, 0.72)';
      ctx.fillRect(190, 36, 580, 100);
      ctx.strokeStyle = '#5b74c5';
      ctx.lineWidth = 4;
      ctx.strokeRect(190, 36, 580, 100);

      ctx.fillStyle = '#fff8de';
      ctx.textAlign = 'center';
      ctx.font = 'bold 42px Courier New';
      ctx.fillText('YASUO & COOKIE', gameCanvas.width / 2, 82);

      ctx.font = 'bold 26px Courier New';
      ctx.fillText('EN RIMAC', gameCanvas.width / 2, 116);

      ctx.fillStyle = 'rgba(12, 20, 48, 0.82)';
      ctx.fillRect(250, 508, 460, 54);
      ctx.strokeStyle = '#5b74c5';
      ctx.lineWidth = 3;
      ctx.strokeRect(250, 508, 460, 54);

      ctx.fillStyle = '#fff8de';
      ctx.font = 'bold 22px Courier New';
      ctx.fillText('ENTER PARA COMENZAR', gameCanvas.width / 2, 544);

      ctx.textAlign = 'left';
    }

    function drawEndOverlay(title, subtitle) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      ctx.fillStyle = '#263f7a';
      ctx.fillRect(220, 200, 520, 150);

      ctx.strokeStyle = '#5d78c9';
      ctx.lineWidth = 4;
      ctx.strokeRect(220, 200, 520, 150);

      ctx.fillStyle = title.includes('Victoria') ? '#8fd36d' : '#ef476f';
      ctx.font = 'bold 34px Courier New';
      ctx.fillText(title, 310, 255);

      ctx.fillStyle = '#fff8de';
      ctx.font = 'bold 20px Courier New';
      ctx.fillText(subtitle, 275, 302);
    }

    function drawPlayingScene() {
      ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
      ctx.fillStyle = '#153057';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      drawNightSky();
      drawGrid();
      drawPath();
      drawTorches();
      drawWalls();
      drawChests();
      drawStartGoal();
      drawMonsters();
      drawPlayer();
      drawHUD();
    }

    function draw() {
      if (state.phase === GAME.title) {
        drawTitleScreen();
        return;
      }

      drawPlayingScene();

      if (state.phase === GAME.win) {
        drawEndOverlay('¡Victoria en Rimac!', 'Reinicia para jugar otra vez');
      }

      if (state.phase === GAME.over) {
        drawEndOverlay('Fin del juego', 'Los tesoros se han perdido');
      }
    }

    let lastTime = 0;

    function loop(timestamp) {
      const delta = Math.min((timestamp - lastTime) / 16.67, 2);
      lastTime = timestamp;

      if (state.phase === GAME.playing) {
        updateMonsters(delta);
        checkCollisions();
      }

      if (state.flashTimer > 0) state.flashTimer -= 1;

      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (
        ['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' ','enter'].includes(key) ||
        ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].includes(e.key)
      ) {
        e.preventDefault();
      }

      if (state.phase === GAME.title && key === 'enter') {
        startGame();
        return;
      }

      if (key === 'arrowup' || key === 'w') movePlayer(0, -1);
      if (key === 'arrowdown' || key === 's') movePlayer(0, 1);
      if (key === 'arrowleft' || key === 'a') movePlayer(-1, 0);
      if (key === 'arrowright' || key === 'd') movePlayer(1, 0);
      if (e.key === ' ') useCookiePower();
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', restartGame);

    restartGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
